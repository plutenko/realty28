name: Reports — утренняя сводка

on:
  schedule:
    # 09:15 Asia/Yakutsk = 00:15 UTC (чуть раньше, т.к. GH Actions часто опаздывает на top-of-hour)
    - cron: '15 0 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'dry-run (не шлёт в чат)'
        type: boolean
        default: false

jobs:
  summary:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reports summary
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then DRY="?dry=1"; fi
          curl -sS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://domovoy28.ru/api/reports/cron/summary${DRY}" \
            | tee /tmp/out.json
          grep -q '"ok":true' /tmp/out.json
