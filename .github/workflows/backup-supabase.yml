name: Supabase Daily Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          mkdir -p backup
          supabase db dump --db-url "$DATABASE_URL" --file "backup/schema-${STAMP}.sql"
          supabase db dump --db-url "$DATABASE_URL" --data-only --file "backup/data-${STAMP}.sql"
          supabase db dump --db-url "$DATABASE_URL" --role-only --file "backup/roles-${STAMP}.sql"
          gzip backup/*.sql
          ls -lh backup/
          echo "STAMP=${STAMP}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.STAMP }}
          path: backup/
          retention-days: 90
          compression-level: 9
