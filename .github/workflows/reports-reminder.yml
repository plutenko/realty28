name: Reports — вечернее напоминание

on:
  schedule:
    # 19:45 Asia/Yakutsk = 10:45 UTC (чуть раньше, т.к. GH Actions часто опаздывает на top-of-hour)
    - cron: '45 10 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'dry-run (не шлёт в чат)'
        type: boolean
        default: false

jobs:
  reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reports reminder
        run: |
          DRY=""
          if [ "${{ github.event.inputs.dry }}" = "true" ]; then DRY="?dry=1"; fi
          curl -sS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://domovoy28.ru/api/reports/cron/reminder${DRY}" \
            | tee /tmp/out.json
          grep -q '"ok":true' /tmp/out.json
