name: Apply Supabase migration

on:
  workflow_dispatch:
    inputs:
      file:
        description: 'Path to migration (e.g. supabase/migrations/042_profiles_soft_delete.sql)'
        required: true
        type: string

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply migration
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "SUPABASE_DB_URL secret is not set"
            exit 1
          fi
          if [ ! -f "${{ github.event.inputs.file }}" ]; then
            echo "File not found: ${{ github.event.inputs.file }}"
            exit 1
          fi
          echo "Applying ${{ github.event.inputs.file }}..."
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "${{ github.event.inputs.file }}"
          echo "Done."
